name: "Build"

permissions:
  contents: write
  packages: write

on:
  push:
    branches:
      - '*'
    paths:
      - 'build.py'
      - '.github/workflows/build.yml'
      - '*.txt'
      - 'conf/*'
      - 'hooks/*'
  pull_request:
    branches:
      - '*'
    paths:
      - 'build.py'
      - '.github/workflows/build.yml'
      - '*.txt'
      - 'conf/*'
      - 'hooks/*'
  workflow_dispatch:

  release:
    types: [ created ]


concurrency: 
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: ["22.04", "24.04", "26.04", "22.04-aarch64", "24.04-aarch64", "26.04-aarch64", "22.04-riscv64", "24.04-riscv64", "26.04-riscv64", "22.04-s390x", "24.04-s390x", "26.04-s390x", "22.04-ppc64le", "24.04-ppc64le", "26.04-ppc64le"]
    runs-on: ubuntu-24.04
    steps:
#    - name: Free Disk Space (Ubuntu)
#      uses: jlumbroso/free-disk-space@main
#      with:
#        # this might remove tools that are actually needed,
#        # if set to "true" but frees about 6 GB
#        tool-cache: false
    - uses: actions/checkout@v6
    - name: Creating Web console
      uses: anyvm-org/cf-tunnel@v0
      id: tunnel
      with:
        protocol: http
        port: 8000
    - run: |
        python3 build.py conf/ubuntu-${{ matrix.os }}.conf
    - name: Upload build artifacts
      uses: actions/upload-artifact@v7
      with:
        # One artifact per matrix job, so they don't collide and each can be
        # downloaded independently from the run page.
        name: ubuntu-${{ matrix.os }}
        path: |
          ubuntu-${{ matrix.os }}.qcow2.zst*
          ubuntu-${{ matrix.os }}-id_rsa.pub
          ubuntu-${{ matrix.os }}-host.id_rsa
          ubuntu-${{ matrix.os }}.qemu
          ubuntu-${{ matrix.os }}.profile.json
        if-no-files-found: warn
        # qcow2.zst is already maximally compressed; gzip-recompressing the
        # bundle just burns CPU for ~0 savings.
        compression-level: 0
        # Auto-expire to keep the repo's artifact storage quota from growing
        # unboundedly. Two days is enough for a human to grab a copy for
        # local verification; anything that needs to persist longer should
        # cut a release (which goes through the Upload Release Asset step
        # below and lives forever).
        retention-days: 2
    - name: Upload Release Asset
      if: "contains(github.ref, 'refs/tags/')"
      id: upload-release-asset
      uses: softprops/action-gh-release@v3
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        files: |
          ubuntu-${{ matrix.os }}.qcow2.zst*
          ubuntu-${{ matrix.os }}-id_rsa.pub
          ubuntu-${{ matrix.os }}-host.id_rsa
          ubuntu-${{ matrix.os }}.qemu
          ubuntu-${{ matrix.os }}.profile.json










  # Publish the pinned QEMU builds some guests need at run time as release
  # assets, so downstream consumers (anyvm's runtime, end users) fetch
  # them from the release alongside the VM images. The ~30MB tarballs are
  # NOT committed to git: files/build-qemu10.sh compiles them from source
  # right here (the same script hooks/host_beforeBuild.sh uses during
  # image builds), then the explicit list below is uploaded.
  # A single job, NOT part of the build matrix: every matrix job uploading
  # the same asset name in parallel would race (GitHub rejects duplicate
  # asset names), and the upload should not depend on any one image build
  # succeeding. Injected via UPLOAD_FILES_JOB in .github/data/datafile.ini;
  # builders without extra release files simply omit that key and the
  # template placeholder renders empty.
  release-files:
    if: "contains(github.ref, 'refs/tags/')"
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v6
    - name: Build the pinned QEMU tarballs
      run: bash files/build-qemu10.sh riscv64 s390x ppc64le
    - name: Upload files/ Release Assets
      uses: softprops/action-gh-release@v3
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        files: |
          files/qemu-10.2.3-riscv64-noble.tar.zst
          files/qemu-10.2.3-s390x-noble.tar.zst
          files/qemu-10.2.3-ppc64le-noble.tar.zst








