  # Publish the pinned QEMU builds some guests need at run time as release
  # assets, so downstream consumers (anyvm's runtime, end users) fetch
  # them from the release alongside the VM images. The ~30MB tarballs are
  # NOT committed to git: files/build-qemu10.sh compiles them from source
  # right here (the same script hooks/host_beforeBuild.sh uses during
  # image builds), then the explicit list below is uploaded.
  # A single job, NOT part of the build matrix: every matrix job uploading
  # the same asset name in parallel would race (GitHub rejects duplicate
  # asset names), and the upload should not depend on any one image build
  # succeeding. Injected via UPLOAD_FILES_JOB in .github/data/datafile.ini;
  # builders without extra release files simply omit that key and the
  # template placeholder renders empty.
  release-files:
    if: "contains(github.ref, 'refs/tags/')"
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v6
    - name: Build the pinned QEMU tarballs
      run: bash files/build-qemu10.sh riscv64 s390x ppc64le
    - name: Upload files/ Release Assets
      uses: softprops/action-gh-release@v3
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        files: |
          files/qemu-10.2.3-riscv64-noble.tar.zst
          files/qemu-10.2.3-s390x-noble.tar.zst
          files/qemu-10.2.3-ppc64le-noble.tar.zst
