

VM_VHD_LINK="https://cloud-images.ubuntu.com/releases/26.04/release/ubuntu-26.04-server-cloudimg-s390x.img"
VM_OS_NAME="ubuntu"
# The GitHub-hosted ubuntu-24.04 runner's libosinfo database may not yet know
# "ubuntu26.04"; fall back to a known variant. It only affects virt-install's
# default device choices, which we override with virtio anyway.
VM_OS_TYPE="ubuntu24.04"
VM_SSH_PORT=2222
VM_RELEASE=26.04

VM_ROOT_PASSWORD=ubuntu

VM_LOGIN_TAG="login:"

VM_SHUTDOWN_CMD="shutdown -h now"

VM_INSTALL_CMD="DEBIAN_FRONTEND=noninteractive apt-get install -y "

VM_RSYNC_PKG="rsync"
VM_SSHFS_PKG="sshfs"

VM_PRE_INSTALL_PKGS="tree $VM_RSYNC_PKG $VM_SSHFS_PKG nfs-common"

# Cloud images no longer ship usable universe indexes; the install step
# needs an apt-get update first (see hooks/vm_installpkgs.sh).
VM_INSTALL_SCRIPT="hooks/vm_installpkgs.sh"

VM_ARCH=s390x
VM_NIC=virtio

# The runner's stock QEMU 8.2 s390x TCG intermittently freezes the guest's
# systemd during startup ("Failed to fork off sandboxing environment for
# executing generators: Protocol error" -> "Freezing execution."), roughly
# once per several boots; the build then hangs at the ssh wait until the
# job times out. Rebooting the same disk comes up fine, so it is an
# emulator flake, not image corruption. Ship qemu-system-s390x 10.2.3
# (same from-source noble-ABI scheme as the riscv64 build, see
# files/README.md) to get years of s390x TCG fixes; setup() extracts the
# tarball and build.py launches via VM_QEMU_BIN.
VM_QEMU_TAR="files/qemu-10.2.3-s390x-noble.tar.zst"
VM_QEMU_BIN="qemu10-s390x/bin/qemu-system-s390x"

# The Ubuntu cloud image has no console password and no SSH key out of the box.
# hooks/host_prepareImage.sh bakes in root SSH access with virt-customize before
# the first boot; hooks/host_waitForLoginTag.sh and hooks/host_enablessh.sh then drive the rest
# over SSH, so we stay on the serial console instead of fragile VNC OCR.
# s390x is emulated (TCG) on the x86 runner: the s390-ccw-virtio machine has
# no VGA at all, so the build is console-only by hardware design (the guest
# console is the SCLP line console, ttysclp0, routed through -serial).
VM_USE_CONSOLE_BUILD=1
VM_NO_VNC_BUILD=1

# Ubuntu 26.04 uses systemd socket activation for sshd (ssh.socket binds :22
# and spawns ssh@.service on first connection). Under TCG s390x emulation,
# that first ssh@.service cold-start can take 30-60 s, so the default 10 s
# ssh-probe timeout reports every retry as "connection timeout" and we never
# detect that sshd is actually answering. Give it 90 s.
VM_SSH_READY_TIMEOUT=90
