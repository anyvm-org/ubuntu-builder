

# Ubuntu names the little-endian POWER port "ppc64el" (image URL below);
# QEMU and build.py call the same arch "ppc64le" (VM_ARCH). Same split as
# aarch64 (conf) vs arm64 (image URL).
VM_VHD_LINK="https://cloud-images.ubuntu.com/releases/22.04/release/ubuntu-22.04-server-cloudimg-ppc64el.img"
VM_OS_NAME="ubuntu"
VM_OS_TYPE="ubuntu22.04"
VM_SSH_PORT=2222
VM_RELEASE=22.04

VM_ROOT_PASSWORD=ubuntu

VM_LOGIN_TAG="login:"

VM_SHUTDOWN_CMD="shutdown -h now"

VM_INSTALL_CMD="DEBIAN_FRONTEND=noninteractive apt-get install -y "

VM_RSYNC_PKG="rsync"
VM_SSHFS_PKG="sshfs"

VM_PRE_INSTALL_PKGS="tree $VM_RSYNC_PKG $VM_SSHFS_PKG nfs-common"

# Cloud images no longer ship usable universe indexes; the install step
# needs an apt-get update first (see hooks/vm_installpkgs.sh).
VM_INSTALL_SCRIPT="hooks/vm_installpkgs.sh"

VM_ARCH=ppc64le
VM_NIC=virtio

# Jammy's python3.10 segfaults under QEMU 8.2 TCG with -cpu power9 (NULL
# derefs in _PyEval_EvalFrameDefault at python3.10+0x12779c; every
# cloud-init stage plus package-data-downloader, 1 or 2 vCPUs alike), so
# ssh host keys are never generated, sshd never starts, and CI run
# 27375165756 burned the full 6h job limit waiting. -cpu power8 is no
# escape: jammy ppc64el userspace is POWER9 baseline (init dies with an
# illegal-instruction kernel panic 3s in). 24.04/26.04 (python 3.12/3.13)
# do not hit the bug on 8.2. Fix: run this build on the pinned QEMU
# 10.2.3 from files/ (same scheme as riscv64/s390x; see files/README.md).
VM_QEMU_TAR="files/qemu-10.2.3-ppc64le-noble.tar.zst"
VM_QEMU_BIN="qemu10-ppc64le/bin/qemu-system-ppc64"

# The Ubuntu cloud image has no console password and no SSH key out of the box.
# hooks/host_prepareImage.sh bakes in root SSH access with virt-customize before
# the first boot; hooks/host_waitForLoginTag.sh and hooks/host_enablessh.sh then drive the rest
# over SSH, so we stay on the serial console instead of fragile VNC OCR.
# ppc64le is emulated (pseries TCG) on the x86 runner, so the build is slow
# but works.
VM_USE_CONSOLE_BUILD=1
VM_NO_VNC_BUILD=1

# Ubuntu 22.04 uses systemd socket activation for sshd (ssh.socket binds :22
# and spawns ssh@.service on first connection). Under TCG emulation that
# first ssh@.service cold-start can take 30-60 s, so the default 10 s
# ssh-probe timeout reports every retry as "connection timeout" and we never
# detect that sshd is actually answering. Give it 90 s.
VM_SSH_READY_TIMEOUT=90
