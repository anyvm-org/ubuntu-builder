


VM_VHD_LINK="https://cloud-images.ubuntu.com/releases/26.04/release/ubuntu-26.04-server-cloudimg-arm64.img"
VM_OS_NAME="ubuntu"
# The GitHub-hosted ubuntu-24.04 runner's libosinfo database may not yet know
# "ubuntu26.04"; fall back to a known variant. It only affects virt-install's
# default device choices, which we override with virtio anyway.
VM_SSH_PORT=2222
VM_RELEASE=26.04

VM_ROOT_PASSWORD=ubuntu

VM_LOGIN_TAG="login:"

VM_SHUTDOWN_CMD="shutdown -h now"

VM_INSTALL_CMD="DEBIAN_FRONTEND=noninteractive apt-get install -y "

VM_RSYNC_PKG="rsync"
VM_SSHFS_PKG="sshfs"

VM_PRE_INSTALL_PKGS="tree $VM_RSYNC_PKG $VM_SSHFS_PKG nfs-common"

# Cloud images no longer ship usable universe indexes; the install step
# needs an apt-get update first (see hooks/vm_installpkgs.sh).
VM_INSTALL_SCRIPT="hooks/vm_installpkgs.sh"

VM_ARCH=aarch64
VM_NIC=virtio

# Ubuntu 26.04 (resolute) aarch64's shim mishandles some feature that
# QEMU's `-cpu max` exposes by default (SVE/SME most likely): BdsDxe loads
# shimaa64.efi, prints "starting Boot0003 Ubuntu", then hangs indefinitely
# with no kernel handoff. Empirically verified that
#  - downgrading the CPU model alone (cortex-a72) lets the boot chain
#    complete and reaches userspace,
#  - swapping AAVMF firmware to the Microsoft-signed .ms variants
#    (preloaded secure-boot keys) does NOT help -- the hang is earlier in
#    BdsDxe, before the shim signature check, so secure-boot init is not
#    the culprit.
# 22.04 / 24.04 aarch64 work fine with the default -cpu max so we override
# only here.
VM_CPU_MODEL=cortex-a72

# Ubuntu 26.04 uses systemd socket activation for sshd (ssh.socket binds :22
# and spawns ssh@.service on first connection). Under TCG aarch64 emulation,
# that first ssh@.service cold-start can take 30-60 s, so the default 10 s
# ssh-probe timeout reports every retry as "connection timeout" and we never
# detect that sshd is actually answering. Give it 90 s.
VM_SSH_READY_TIMEOUT=90

# The Ubuntu cloud image has no console password and no SSH key out of the box.
# hooks/host_prepareImage.sh bakes in root SSH access with virt-customize before
# the first boot; hooks/host_waitForLoginTag.sh and hooks/host_enablessh.sh then drive the rest
# over SSH, so we stay on the serial console instead of fragile VNC OCR.
# aarch64 is emulated (TCG) on the x86 runner, so the build is slow but works.
VM_USE_CONSOLE_BUILD=1
VM_NO_VNC_BUILD=1

VM_SYNC_METHODS="rsync,scp,sshfs,nfs"
