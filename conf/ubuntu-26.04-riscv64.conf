


# Ubuntu only publishes riscv64 cloud images under the codename URL path
# (https://cloud-images.ubuntu.com/releases/<codename>/release/), not under
# the /<version>/release/ path used for amd64 and arm64.
VM_VHD_LINK="https://cloud-images.ubuntu.com/releases/resolute/release/ubuntu-26.04-server-cloudimg-riscv64.img"
VM_OS_NAME="ubuntu"
# The GitHub-hosted ubuntu-24.04 runner's libosinfo database may not yet know
# "ubuntu26.04"; fall back to a known variant. It only affects virt-install's
# default device choices, which we override with virtio anyway.
VM_OS_TYPE="ubuntu24.04"
VM_SSH_PORT=2222
VM_RELEASE=26.04

VM_ROOT_PASSWORD=ubuntu

VM_LOGIN_TAG="login:"

VM_SHUTDOWN_CMD="shutdown -h now"

VM_INSTALL_CMD="DEBIAN_FRONTEND=noninteractive apt-get install -y "

VM_RSYNC_PKG="rsync"
VM_SSHFS_PKG="sshfs"

VM_PRE_INSTALL_PKGS="tree $VM_RSYNC_PKG $VM_SSHFS_PKG nfs-common"

VM_ARCH=riscv64
VM_NIC=virtio

# Ubuntu 26.04 (resolute) riscv64 cannot run under the runner's stock QEMU
# 8.2: its kernel 7.0 hangs at entry with zero serial output (even with
# earlycon and direct -kernel boot), and its userspace is built for the
# RVA23 profile baseline, so under any pre-RVA23 -cpu model init dies with
# SIGILL (do_trap_insn_illegal -> "Attempted to kill init!"). Both are
# fixed by a newer QEMU + the rva23s64 CPU model (QEMU >= 9.1): verified
# end-to-end to the login prompt with QEMU 10.x. Ship our own
# qemu-system-riscv64 10.2.3 built against noble's libraries (same ABI as
# the GHA ubuntu-24.04 runner) as a tarball committed in files/ (see
# files/README.md); setup() extracts it next to the work dir and
# build.py launches it via VM_QEMU_BIN.
VM_QEMU_TAR="files/qemu-10.2.3-riscv64-noble.tar.zst"
VM_QEMU_BIN="qemu10/bin/qemu-system-riscv64"
VM_CPU_MODEL=rva23s64

# The Ubuntu cloud image has no console password and no SSH key out of the box.
# hooks/host_prepareImage.sh bakes in root SSH access with virt-customize before
# the first boot; hooks/host_waitForLoginTag.sh and hooks/host_enablessh.sh then drive the rest
# over SSH, so we stay on the serial console instead of fragile VNC OCR.
# riscv64 is emulated (TCG) on the x86 runner, so the build is slow but works.
VM_USE_CONSOLE_BUILD=1
VM_NO_VNC_BUILD=1

# Ubuntu 26.04 uses systemd socket activation for sshd (ssh.socket binds :22
# and spawns ssh@.service on first connection). Under TCG riscv64 emulation,
# that first ssh@.service cold-start can take 30-60 s, so the default 10 s
# ssh-probe timeout reports every retry as "connection timeout" and we never
# detect that sshd is actually answering. Give it 90 s.
VM_SSH_READY_TIMEOUT=90
