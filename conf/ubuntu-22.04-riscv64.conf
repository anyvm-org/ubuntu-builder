


# Ubuntu only publishes riscv64 cloud images under the codename URL path
# (https://cloud-images.ubuntu.com/releases/<codename>/release/), not under
# the /<version>/release/ path used for amd64 and arm64.
VM_VHD_LINK="https://cloud-images.ubuntu.com/releases/jammy/release/ubuntu-22.04-server-cloudimg-riscv64.img"
VM_OS_NAME="ubuntu"
VM_SSH_PORT=2222
VM_RELEASE=22.04

VM_ROOT_PASSWORD=ubuntu

VM_LOGIN_TAG="login:"

VM_SHUTDOWN_CMD="shutdown -h now"

VM_INSTALL_CMD="DEBIAN_FRONTEND=noninteractive apt-get install -y "

VM_RSYNC_PKG="rsync"
VM_SSHFS_PKG="sshfs"

VM_PRE_INSTALL_PKGS="tree $VM_RSYNC_PKG $VM_SSHFS_PKG nfs-common"

# Cloud images no longer ship usable universe indexes; the install step
# needs an apt-get update first (see hooks/vm_installpkgs.sh).
VM_INSTALL_SCRIPT="hooks/vm_installpkgs.sh"

VM_ARCH=riscv64
VM_NIC=virtio

# Ubuntu 22.04 (jammy) riscv64 cloud images boot via u-boot's extlinux /
# sysboot path: /boot lives on the root partition (so u-boot's distro scan
# finds /boot/extlinux/extlinux.conf) and the ESP is EMPTY -- no grub at
# all, so there is no EFI fallback. u-boot >= 2024.10 (the runner's
# u-boot-qemu 2025.10) regressed that path: its LMB rework makes the
# in-place FDT reservation fail ("Failed to reserve memory for fdt at
# 0x<RAM-top-ish> / FDT creation failed! hanging...") at ANY -m size,
# because the qemu-riscv default env pins fdt_high=0xffffffffffffffff
# (never relocate) while the working FDT sits inside u-boot's own
# pre-reserved region. Pin the noble GA u-boot 2024.01, which predates the
# rework and boots this image unattended (verified locally end-to-end to
# the login prompt). 24.04/26.04 boot via EFI grub and are unaffected.
# The binary is committed in files/ (see files/README.md for provenance)
# so the build does not download it every run. The pin is only needed for
# the BUILD's first boot: hooks/vm_postBuild.sh then converts the artifact
# to EFI grub boot (installs grub-efi-riscv64, disables extlinux), so end
# users need no u-boot pin at run time.
VM_UBOOT="files/u-boot-qemu_2024.01_qemu-riscv64_smode/uboot.elf"

# The Ubuntu cloud image has no console password and no SSH key out of the box.
# hooks/host_prepareImage.sh bakes in root SSH access with virt-customize before
# the first boot; hooks/host_waitForLoginTag.sh and hooks/host_enablessh.sh then drive the rest
# over SSH, so we stay on the serial console instead of fragile VNC OCR.
# riscv64 is emulated (TCG) on the x86 runner, so the build is slow but works.
VM_USE_CONSOLE_BUILD=1
VM_NO_VNC_BUILD=1

# Ubuntu 22.04 uses systemd socket activation for sshd (ssh.socket binds :22
# and spawns ssh@.service on first connection). Under TCG riscv64 emulation,
# that first ssh@.service cold-start can take 30-60 s, so the default 10 s
# ssh-probe timeout reports every retry as "connection timeout" and we never
# detect that sshd is actually answering. Give it 90 s.
VM_SSH_READY_TIMEOUT=90

VM_SYNC_METHODS="rsync,scp,sshfs,nfs"
